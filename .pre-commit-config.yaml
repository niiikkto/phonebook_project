repos:
  # Основные проверки файлов
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Проверка пробелов в конце строк
      - id: trailing-whitespace
      # Проверка, что в конце файла есть пустая строка
      - id: end-of-file-fixer
      # Проверка синтаксиса YAML файлов
      - id: check-yaml
      # Проверка синтаксиса JSON файлов
      - id: check-json
      # Проверка, что нет файлов больше 500KB
      - id: check-added-large-files
        args: ['--maxkb=500']

  # Форматтер Black
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3

  # Линтер Ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # Сортировка импортов
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]
